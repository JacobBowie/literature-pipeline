name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile-check every script
        shell: bash
        run: |
          find . -maxdepth 1 -name '*.py' -print0 | xargs -0 python -m py_compile

      - name: Smoke-test --help on every CLI
        shell: bash
        run: |
          set -e
          for f in $(find . -maxdepth 1 -name '*.py' -not -name 'ris_emit.py' -not -name 'jats_to_text.py' -not -name 'pdf_text_clean.py'); do
            echo "--- $f --help"
            python "$f" --help > /dev/null
          done

      - name: Run pytest
        run: pytest tests/ -v
